<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유치원 버스를 잡아라! (2인용)</title>
    <!-- MediaPipe Hands & Camera Utils -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a202c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 24px;
            border-radius: 16px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2.5rem;
            border-radius: 2rem;
            text-align: center;
            display: none;
            z-index: 100;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #loading-screen {
            position: absolute;
            inset: 0;
            background: #1a202c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="loading-screen">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-4"></div>
            <p id="loading-text">2인용 모드와 AI 모델을 불러오고 있습니다...</p>
        </div>

        <video id="input_video" style="display:none;" playsinline></video>
        <canvas id="output_canvas"></canvas>

        <div class="ui-overlay">
            <div class="stat-card">
                <p class="text-xs font-semibold text-blue-400 uppercase tracking-wider">협동 점수 (Score)</p>
                <p class="text-4xl font-black"><span id="score-val">0</span><span class="text-lg text-gray-400"> / 100</span></p>
            </div>
            <div class="stat-card">
                <p class="text-xs font-semibold text-yellow-400 uppercase tracking-wider text-right">남은 시간 (Time)</p>
                <p class="text-4xl font-black text-yellow-400"><span id="timer-val">60</span>s</p>
            </div>
        </div>

        <div id="message-box">
            <h2 id="msg-title" class="text-4xl font-bold mb-4"></h2>
            <p id="msg-body" class="text-xl mb-8 text-gray-600"></p>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-2xl shadow-lg transition-all active:scale-95">
                다시 시작하기
            </button>
        </div>
    </div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const timerVal = document.getElementById('timer-val');
    const messageBox = document.getElementById('message-box');
    const loadingScreen = document.getElementById('loading-screen');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let vehicles = [];
    const BUS_EMOJI = '🚌';
    const OTHER_VEHICLES = ['🚗', '🚕', '🚓', '🚑', '🚒', '🚲', '🚜'];

    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        window.speechSynthesis.speak(utterance);
    }

    class Vehicle {
        constructor() {
            this.isBus = Math.random() < 0.35; // 버스 확률을 약간 높임
            this.emoji = this.isBus ? BUS_EMOJI : OTHER_VEHICLES[Math.floor(Math.random() * OTHER_VEHICLES.length)];
            // 크기를 대폭 키움 (기존 70~120 -> 120~180)
            this.size = 120 + Math.random() * 60;
            this.x = Math.random() * (canvasElement.width - this.size);
            this.y = -this.size;
            this.speed = 3 + Math.random() * 4; // 크기가 커졌으므로 속도는 약간 조절
            this.active = true;
        }
        update() {
            this.y += this.speed;
            if (this.y > canvasElement.height) this.active = false;
        }
        draw() {
            canvasCtx.save();
            canvasCtx.translate(this.x + this.size / 2, this.y + this.size / 2);
            canvasCtx.scale(-1, 1);
            canvasCtx.font = `${this.size}px serif`;
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(this.emoji, 0, 0);
            canvasCtx.restore();
        }
    }

    function onResults(results) {
        if (loadingScreen.style.display !== 'none') {
            loadingScreen.style.display = 'none';
            gameActive = true;
            startTimer();
            speak("두 명이서 힘을 합쳐 유치원 버스를 잡으세요! 시작합니다.");
        }

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        const currentHands = [];

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                const tip = landmarks[8]; // 검지 손가락 끝
                const hx = tip.x * canvasElement.width;
                const hy = tip.y * canvasElement.height;
                currentHands.push({x: hx, y: hy});

                // 손 위치 표시 (각 손마다 다른 색상 효과)
                canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                canvasCtx.shadowBlur = 25;
                canvasCtx.shadowColor = '#3b82f6';
                canvasCtx.beginPath();
                canvasCtx.arc(hx, hy, 20, 0, 2 * Math.PI);
                canvasCtx.fill();
            }
        }

        if (gameActive) {
            // 차량 생성 주기 조절
            if (Math.random() < 0.05) vehicles.push(new Vehicle());

            for (let i = vehicles.length - 1; i >= 0; i--) {
                const v = vehicles[i];
                v.update();
                v.draw();

                // 모든 손에 대해 충돌 체크
                for (const hand of currentHands) {
                    const dx = hand.x - (v.x + v.size/2);
                    const dy = hand.y - (v.y + v.size/2);
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < v.size / 1.3) {
                        if (v.isBus) {
                            score += 10;
                            scoreVal.innerText = score;
                            v.active = false;
                            
                            // 획득 효과음 대용 시각 피드백
                            canvasCtx.save();
                            canvasCtx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                            canvasCtx.fillRect(0,0, canvasElement.width, canvasElement.height);
                            canvasCtx.restore();

                            if (score >= 100) endGame(true);
                        } else {
                            v.active = false; // 다른 차는 그냥 사라짐
                        }
                        break; // 한 차량은 한 번만 체크
                    }
                }

                if (!v.active) vehicles.splice(i, 1);
            }
        }
        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2, // 2명(두 손) 인식 설정
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 1280, height: 720 }
            });
            videoElement.srcObject = stream;
            videoElement.play();
            
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 1280,
                height: 720
            });
            camera.start();
        } catch (err) {
            console.error(err);
            document.getElementById('loading-text').innerHTML = 
                "<span class='text-red-500 font-bold text-lg'>카메라를 연결할 수 없습니다.<br>브라우저 상단에서 카메라 권한을 허용해 주세요.</span>";
        }
    }

    function startTimer() {
        const interval = setInterval(() => {
            if (!gameActive) {
                clearInterval(interval);
                return;
            }
            timeLeft--;
            timerVal.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                endGame(score >= 100);
            }
        }, 1000);
    }

    function endGame(success) {
        gameActive = false;
        messageBox.style.display = 'block';
        const title = document.getElementById('msg-title');
        const body = document.getElementById('msg-body');

        if (success) {
            title.innerText = "🏆 미션 성공!";
            title.style.color = "#16a34a";
            body.innerText = `두 분의 멋진 협동으로 ${score}점을 얻었습니다! 축하합니다!`;
            speak("축하합니다! 두 분이 힘을 합쳐 미션에 성공했습니다!");
        } else {
            title.innerText = "⏰ 시간 종료";
            title.style.color = "#dc2626";
            body.innerText = `최종 점수는 ${score}점입니다. 100점까지 조금 모자랐네요. 다시 도전해볼까요?`;
            speak("시간이 다 되었습니다. 아쉽지만 이번에는 미션 실패입니다.");
        }
    }

    window.onload = () => {
        canvasElement.width = 1280;
        canvasElement.height = 720;
        initCamera();
    };
</script>
</body>
</html>
